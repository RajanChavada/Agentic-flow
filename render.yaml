services:
  - type: web
    name: neurovn-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: oregon
    envVars:
      - key: FRONTEND_ORIGINS
        value: http://localhost:3000,https://neurovn.vercel.app,https://neurovn-alpha.vercel.app
      - key: PORT
        value: "8000"
    healthCheckPath: /health
